name: CI with CUDA

on:
  push:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.9.0-devel-ubuntu24.04

    timeout-minutes: 180
    steps:
      - name: Set timezone
        run: ln -fs /usr/share/zoneinfo/Europe/Helsinki /etc/localtime

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y apt-transport-https ca-certificates gnupg software-properties-common wget
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | gpg --dearmor - | tee /etc/apt/trusted.gpg.d/kitware.gpg >/dev/null
          apt-add-repository 'deb https://apt.kitware.com/ubuntu/ noble main'
          apt-get update
          apt-get install -y cmake flex bison openmpi-bin libopenmpi-dev gfortran git python3 python3-numpy python3-pandas

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Start SSH agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CI_CD_KEY }}


      - name: Build and test
        run: |
          . ./sourceme.sh
          ./test/run_syntaxtest.sh
          export OMPI_ALLOW_RUN_AS_ROOT=1
          export OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
          cd $AC_HOME/test-builds && ac_build_tests --parallel
          cd $AC_HOME/test-builds && ac_run_tests
          cd $AC_HOME/test && ac_build_tests 
          cd $AC_HOME/test && ac_build_tests --cpu
          cd $AC_HOME/test && ac_run_tests

