*
 * =============================================================================
 * "Compile-time" params
 * =============================================================================
 */
//Number of integration points
AC_integration_points_x = 320
AC_integration_points_y = 320
AC_integration_points_z = 1
AC_integration_points_w = 1

//Integration bounds
AC_integration_start_x = 1e-0
AC_integration_start_y = 1e-0
AC_integration_end_x = 100.0
AC_integration_end_y = 100.0

//Whether in log or linspace
AC_logspace = T

//Input arguments for integrand
AC_v = 0.33333333
AC_k = 1.0

//Integration method (can be both for checking convergence)
AC_trapezoidal = F
AC_gauss_legendre = T


AC_periodic_grid = {F,F,F}
AC_set_tpb = {16,8,1}
AC_thread_block_loop_factors = {1,64,64}
